<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Gaming Store</title>

<link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/styles.css">

</head>

<body>

<header class="header">

<div class="header-container">

<div class="logo">VIDEOFREAKY</div>

<nav class="menu">

<a href="#">Tienda</a>
<a href="#">Biblioteca</a>
<a href="#">Comunidad</a>
<a href="#">Noticias</a>

</nav>

<div class="search">

<input type="text" placeholder="Buscar juegos">

</div>

</div>

</header>


<main class="container">


<section class="carousel">

<div class="slides">

<img src="https://picsum.photos/1200/400?1">
<img src="https://picsum.photos/1200/400?2">
<img src="https://picsum.photos/1200/400?3">

</div>

</section>



<section class="section">

<h2 class="titulo">Ofertas destacadas</h2>

<div class="grid-juegos">



<div class="card">

<div class="img-container">

<img src="https://picsum.photos/300/180?1">

<video class="preview" muted loop>
<source src="video/game1.mp4" type="video/mp4">
</video>

<span class="discount">-50%</span>

<div class="hover-info">
<button class="download">Descargar</button>
</div>

</div>

<div class="card-info">

<h3>Cyber Strike</h3>

<div class="price">

<span class="old">$160.000 COP</span>
<span class="new">$76.000 COP</span>

</div>

</div>

</div>



<div class="card">

<div class="img-container">

<img src="https://picsum.photos/300/180?1">

<video class="preview" muted loop>
<source src="video/game1.mp4" type="video/mp4">
</video>

<span class="discount">-50%</span>

<div class="hover-info">
<button class="download">Descargar</button>
</div>

</div>

<div class="card-info">

<h3>Dark Planet</h3>

<div class="price">

<span class="old">$139.900 COP</span>
<span class="new">$97.900 COP</span>

</div>

</div>

</div>



<div class="card">

<div class="img-container">

<img src="https://picsum.photos/300/180?1">

<video class="preview" muted loop>
<source src="video/game1.mp4" type="video/mp4">
</video>

<span class="discount">-50%</span>

<div class="hover-info">
<button class="download">Descargar</button>
</div>

</div>

<div class="card-info">

<h3>Future Wars</h3>

<div class="price">

<span class="old">$190.900 COP</span>
<span class="new">$59.900 COP</span>

</div>

</div>

</div>



</div>

</section>



<section class="section">

<h2 class="titulo">Explorar categorías</h2>

<div class="grid-categorias">

<div class="categoria">Acción</div>
<div class="categoria">RPG</div>
<div class="categoria">Terror</div>
<div class="categoria">Carreras</div>
<div class="categoria">Estrategia</div>

</div>

</section>


</main>



<footer class="footer">

VideoFreaky © 2026

</footer>

</body>
</html>
